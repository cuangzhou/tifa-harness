name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install -e ".[test]"
      - run: python -m ruff check .
      - run: python -m mypy tifa/contracts.py tifa/execution.py tifa/providers.py tifa/workspace.py tifa/performance.py tifa/doctor.py tifa/verifier.py tifa/semantic_index.py tifa/operations.py tifa/reporting.py tifa/eval_suite.py
      - run: python -m pytest --cov=tifa --cov-report=term-missing --cov-fail-under=85
      - run: python -m build
      - run: python -m pip install --force-reinstall dist/*.whl
        if: runner.os == 'Linux'
      - run: tifa --help

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[test]"
      - run: docker build -t tifa-runner:0.5.0 -f docker/runner.Dockerfile docker
      - run: TIFA_TEST_DOCKER=1 python -m pytest tests/test_execution.py
      - run: python -m tifa benchmark workspace --repeats 3 --output evaluation/artifacts/workspace-performance.json
