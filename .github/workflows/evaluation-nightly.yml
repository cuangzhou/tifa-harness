name: Evaluation nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  local-capability:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[test]"
      - run: docker build -t tifa-runner:0.5.0 -f docker/runner.Dockerfile docker
      - run: curl -fsSL https://ollama.com/install.sh | sh
      - run: ollama serve > /tmp/ollama.log 2>&1 &
      - run: ollama pull qwen2.5-coder:3b
      - run: python -m tifa eval local --model qwen2.5-coder:3b --repetitions 3 --output evaluation-nightly.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-nightly-${{ github.sha }}
          retention-days: 30
          path: evaluation-nightly*.json
